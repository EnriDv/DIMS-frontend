name: Frontend Continuous Deployment

on:
  push:
    branches: ["master", "main"]

jobs:
  ci-and-security:
    name: Test, Scan and Push Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set lowercase owner name
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Test
        run: |
          npm ci
          # Si tienes configurado Vitest, descomenta la siguiente línea:
          # npm run test -- --run

      - name: Build Production Docker Image
        run: |
          docker build --build-arg PUBLIC_API_URL="http://${{ secrets.AWS_EC2_HOST }}/api" -t ghcr.io/${{ env.OWNER_LC }}/dims-frontend:latest -f dockerfile .

      - name: Trivy Container Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ env.OWNER_LC }}/dims-frontend:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Frontend Image
        run: docker push ghcr.io/${{ env.OWNER_LC }}/dims-frontend:latest

  deploy-to-ec2:
    name: Deploy Frontend to EC2 via SSH
    needs: ci-and-security
    runs-on: ubuntu-latest
    env:
      OWNER_LC: ${{ github.repository_owner }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
      PUBLIC_APP_NAME: ${{ secrets.PUBLIC_APP_NAME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
    steps:
      - name: Set lowercase owner name
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          envs: OWNER_LC,DB_NAME,DB_USERNAME,DB_PASSWORD,JWT_SECRET_KEY,JWT_ISSUER,JWT_AUDIENCE,CORS_ORIGINS,PUBLIC_APP_NAME,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,S3_BUCKET_NAME
          script: |
            cd /home/ubuntu/apps/
            cat <<EOF > .env
            REPO_OWNER=${OWNER_LC}
            DB_NAME=${DB_NAME}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET_KEY=${JWT_SECRET_KEY}
            JWT_ISSUER=${JWT_ISSUER}
            JWT_AUDIENCE=${JWT_AUDIENCE}
            CORS_ORIGINS=${CORS_ORIGINS}
            PUBLIC_APP_NAME=${PUBLIC_APP_NAME}
            AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
            AWS_REGION=us-east-1
            S3_BUCKET_NAME=${S3_BUCKET_NAME}
            EOF
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend
            docker image prune -f
