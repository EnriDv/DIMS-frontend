name: Frontend Continuous Deployment

on:
  push:
    branches: ["master", "main"]

jobs:
  ci-and-security:
    name: Test, Scan and Push Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set lowercase owner name
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Test
        run: |
          npm ci
          # Si tienes configurado Vitest, descomenta la siguiente línea:
          # npm run test -- --run

      - name: Build Production Docker Image
        run: |
          docker build --build-arg PUBLIC_API_URL="http://${{ secrets.AWS_EC2_HOST }}/api" -t ghcr.io/${{ env.OWNER_LC }}/dims-frontend:latest -f dockerfile .

      - name: Trivy Container Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ env.OWNER_LC }}/dims-frontend:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Frontend Image
        run: docker push ghcr.io/${{ env.OWNER_LC }}/dims-frontend:latest

  deploy-to-ec2:
    name: Deploy Frontend to EC2 via SSH
    needs: ci-and-security
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/apps/
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d frontend
            docker image prune -f
